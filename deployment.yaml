apiVersion: apps/v1
kind: Deployment
metadata:
  name: rate-limit-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rate-limit
  template:
    metadata:
      labels:
        app: rate-limit
    spec:
      containers:
      - name: rate-limit-container
        image: ved/autoheal-rate-limit:latest
        ports:
        - containerPort: 8000
