version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/').read()"]
      interval: 30s
      timeout: 5s
      start_period: 10s
    volumes:
      - autoheal_db:/app/autoheal_data
    working_dir: /app

  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./Webpage.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  autoheal_db:

